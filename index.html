<!DOCTYPE html>
<html>
<head>
    <title>Siloé Design & Communication</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Siloé Design & Communication</h1>
    <button id="adminBtn">Admin</button>
    <div id="adminPanel" style="display:none; background:#ddd; padding:10px;">
        <div id="loginArea">
            <input type="password" id="adminPwd" placeholder="Mot de passe">
            <button id="loginBtn">Se connecter</button>
        </div>
        <div id="adminControls" style="display:none;">
            <input type="text" id="prodName" placeholder="Nom">
            <input type="text" id="prodPrice" placeholder="Prix">
            <button id="addBtn">Ajouter</button>
        </div>
    </div>
    <div id="products"></div>
    <div id="messages" style="margin-top:20px; background:#f0f0f0; padding:10px;"></div>

    <script>
        // Utilisation d'un nom différent pour éviter le conflit
        const supabaseUrl = "https://otdiywrvzappbmjfkkyi.supabase.co";
        const supabaseKey = "sb_publishable_tn6FW9OxsqNdKMg9uCuB5A_gZICo-Jy";
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        const ADMIN_PASSWORD = "monMotDePasse123";
        let isAdmin = false;

        function addMessage(text, isError = true) {
            const msgDiv = document.getElementById("messages");
            const p = document.createElement("p");
            p.style.color = isError ? "red" : "green";
            p.innerText = text;
            msgDiv.appendChild(p);
        }

        async function loadProducts() {
            addMessage("Chargement des produits...", false);
            try {
                const { data, error } = await supabaseClient.from("products").select("*");
                if (error) throw error;
                if (!data || data.length === 0) {
                    document.getElementById("products").innerHTML = "Aucun produit.";
                    addMessage("Aucun produit trouvé.", false);
                } else {
                    document.getElementById("products").innerHTML = data.map(p => `<div>${p.name} - ${p.price}</div>`).join("");
                    addMessage("Produits chargés : " + data.length, false);
                }
            } catch(err) {
                addMessage("ERREUR chargement : " + err.message);
                document.getElementById("products").innerHTML = "Erreur : " + err.message;
            }
        }

        async function addProduct() {
            if (!isAdmin) { addMessage("Non autorisé"); return; }
            const name = document.getElementById("prodName").value;
            const price = document.getElementById("prodPrice").value;
            if (!name || !price) { addMessage("Nom et prix requis"); return; }
            try {
                const { error } = await supabaseClient.from("products").insert([{ name, price }]);
                if (error) throw error;
                addMessage("Produit ajouté !", false);
                loadProducts();
                document.getElementById("prodName").value = "";
                document.getElementById("prodPrice").value = "";
            } catch(err) {
                addMessage("Erreur ajout : " + err.message);
            }
        }

        function login() {
            const pwd = document.getElementById("adminPwd").value;
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById("loginArea").style.display = "none";
                document.getElementById("adminControls").style.display = "block";
                addMessage("Connecté admin", false);
                loadProducts();
            } else {
                addMessage("Mot de passe incorrect");
            }
        }

        function togglePanel() {
            const panel = document.getElementById("adminPanel");
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        }

        document.getElementById("adminBtn").addEventListener("click", togglePanel);
        document.getElementById("loginBtn").addEventListener("click", login);
        document.getElementById("addBtn").addEventListener("click", addProduct);
        loadProducts();
    </script>
</body>
</html>
