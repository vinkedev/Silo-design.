<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Admin</title>
    <style>
        .admin-panel { display: none; background: #f0f0f0; padding: 20px; margin-top: 20px; }
        .admin-panel.active { display: block; }
        nav ul { list-style: none; display: flex; gap: 20px; background: #333; padding: 10px; }
        nav ul li a { color: white; text-decoration: none; cursor: pointer; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: blue; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#">Accueil</a></li>
            <li><a id="admin-menu">Admin</a></li>
        </ul>
    </nav>
    <div id="adminPanel" class="admin-panel">
        <h3>Panneau admin</h3>
        <p>Le panneau s'affiche !</p>
    </div>
    <button id="adminFab" class="admin-btn">🔧</button>

    <script>
        function togglePanel() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('active');
        }

        document.getElementById('admin-menu').addEventListener('click', function(e) {
            e.preventDefault();
            togglePanel();
        });
        document.getElementById('adminFab').addEventListener('click', togglePanel);
    </script>
</body>
</html>
