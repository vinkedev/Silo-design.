<!DOCTYPE html>
<html>
<head><title>Test panneau</title></head>
<body>
<nav>
  <ul>
    <li><a id="adminMenu">Admin</a></li>
  </ul>
</nav>
<div id="adminPanel" style="display:none; background:#ddd; padding:10px;">Panneau admin</div>
<button id="adminFab">🔧</button>

<script>
  function togglePanel() {
    const panel = document.getElementById('adminPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }
  document.getElementById('adminMenu').addEventListener('click', togglePanel);
  document.getElementById('adminFab').addEventListener('click', togglePanel);
</script>
</body>
</html>
