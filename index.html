<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Siloé Design & Communication</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f7fc; }
        nav { background: #1e3a5f; padding: 1rem; }
        nav ul { list-style: none; display: flex; gap: 1rem; margin: 0; padding: 0; justify-content: center; }
        nav ul li a { color: white; text-decoration: none; cursor: pointer; }
        section { padding: 2rem; text-align: center; }
        .admin-panel { background: white; border: 1px solid #ccc; padding: 1rem; margin: 1rem auto; max-width: 500px; display: none; }
        .admin-panel.active { display: block; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: #2c3e50; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 20px; cursor: pointer; }
        .product { background: white; padding: 1rem; margin: 1rem auto; max-width: 400px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .error-msg { color: red; background: #ffe0e0; padding: 10px; margin: 10px; border-radius: 5px; }
        .success-msg { color: green; background: #e0ffe0; padding: 10px; margin: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a id="adminMenuBtn">Admin</a></li>
        </ul>
    </nav>

    <div id="errorDisplay" style="margin: 10px;"></div>

    <div id="adminPanel" class="admin-panel">
        <div id="loginArea">
            <input type="password" id="adminPwd" placeholder="Mot de passe">
            <button id="loginBtn">Se connecter</button>
        </div>
        <div id="adminControls" style="display:none;">
            <h3>Ajouter un produit</h3>
            <input type="text" id="prodName" placeholder="Nom du produit"><br><br>
            <input type="text" id="prodPrice" placeholder="Prix (ex: 19,90 €)"><br><br>
            <button id="addBtn">Ajouter</button>
        </div>
    </div>
    <button id="adminFab" class="admin-btn">🔧</button>

    <h2>Nos produits digitaux</h2>
    <div id="productsList"></div>

    <script>
        // ========== CONFIGURATION SUPABASE ==========
        const supabaseUrl = "https://otdiywrvzappbmjfkkyi.supabase.co";
        const supabaseKey = "sb_publishable_tn6FW9OxsqNdKMg9uCuB5A_gZICo-Jy";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        const ADMIN_PASSWORD = 'monMotDePasse123';
        let isAdmin = false;

        function showError(msg) {
            const div = document.getElementById('errorDisplay');
            div.innerHTML = `<div class="error-msg">❌ ${msg}</div>`;
        }

        function showSuccess(msg) {
            const div = document.getElementById('errorDisplay');
            div.innerHTML = `<div class="success-msg">✅ ${msg}</div>`;
        }

        // === CHARGER LES PRODUITS ===
        async function loadProducts() {
            const container = document.getElementById('productsList');
            container.innerHTML = 'Chargement des produits...';
            try {
                const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                if (!data || data.length === 0) {
                    container.innerHTML = '<p>Aucun produit pour le moment.</p>';
                    return;
                }
                container.innerHTML = data.map(p => `
                    <div class="product">
                        <strong>${escapeHtml(p.name)}</strong> - ${escapeHtml(p.price)}
                        ${isAdmin ? `<button onclick="deleteProduct('${p.id}')">Supprimer</button>` : ''}
                    </div>
                `).join('');
                showSuccess('Produits chargés avec succès');
            } catch (err) {
                container.innerHTML = `<p>Erreur lors du chargement : ${err.message}</p>`;
                showError(`Erreur chargement produits : ${err.message}`);
                // Si l'erreur indique que la table n'existe pas, donner un conseil
                if (err.message.includes("relation") && err.message.includes("does not exist")) {
                    showError(`La table "products" n'existe pas dans Supabase. Créez-la via l'éditeur SQL : CREATE TABLE products (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, name text NOT NULL, price text NOT NULL, description text, image_url text, created_at timestamptz DEFAULT now());`);
                }
            }
        }

        // === AJOUTER PRODUIT ===
        async function addProduct() {
            if (!isAdmin) { alert('Vous devez être connecté en tant qu\'admin'); return; }
            const name = document.getElementById('prodName').value.trim();
            const price = document.getElementById('prodPrice').value.trim();
            if (!name || !price) { alert('Nom et prix requis'); return; }
            try {
                const { error } = await supabase.from('products').insert([{ name, price }]);
                if (error) throw error;
                showSuccess('Produit ajouté !');
                document.getElementById('prodName').value = '';
                document.getElementById('prodPrice').value = '';
                loadProducts();
            } catch (err) {
                showError(`Erreur lors de l'ajout : ${err.message}`);
            }
        }

        // === SUPPRIMER PRODUIT ===
        window.deleteProduct = async function(id) {
            if (!isAdmin) return;
            if (!confirm('Supprimer ce produit ?')) return;
            try {
                const { error } = await supabase.from('products').delete().eq('id', id);
                if (error) throw error;
                showSuccess('Produit supprimé');
                loadProducts();
            } catch (err) {
                showError(`Erreur suppression : ${err.message}`);
            }
        };

        // === CONNEXION ADMIN ===
        function login() {
            const pwd = document.getElementById('adminPwd').value;
            if (pwd === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminControls').style.display = 'block';
                showSuccess('Connecté en tant qu\'administrateur');
                loadProducts(); // recharge pour afficher les boutons supprimer
            } else {
                alert('Mot de passe incorrect');
            }
        }

        // === AFFICHER / MASQUER LE PANNEAU ADMIN ===
        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('active');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        // === INITIALISATION ===
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            document.getElementById('loginBtn').addEventListener('click', login);
            document.getElementById('addBtn').addEventListener('click', addProduct);
            document.getElementById('adminMenuBtn').addEventListener('click', toggleAdminPanel);
            document.getElementById('adminFab').addEventListener('click', toggleAdminPanel);
        });
    </script>
</body>
</html>
