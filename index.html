<!DOCTYPE html>
<html>
<head>
    <title>Test simple Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <button id="test">Tester connexion Supabase</button>
    <div id="result"></div>

    <script>
        const supabaseUrl = "https://otdiywrvzappbmjfkkyi.supabase.co";
        const supabaseKey = "sb_publishable_tn6FW9OxsqNdKMg9uCuB5A_gZICo-Jy";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById("test").onclick = async () => {
            const { data, error } = await supabase.from("products").select("*");
            if (error) {
                document.getElementById("result").innerHTML = "❌ Erreur : " + error.message;
            } else {
                document.getElementById("result").innerHTML = "✅ Connexion OK. Nombre de produits : " + (data ? data.length : 0);
            }
        };
    </script>
</body>
</html>
